  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#060a0b;--panel:rgba(10,24,26,.94);

    display:flex;flex-direction:column;align-items:center;padding:18px 10px 48px}

  .sub{color:var(--mute);font-size:11px;letter-spacing:2px;margin-bottom:14px}
  .leg{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    background:var(--panel);border:1px solid var(--bdr);border-radius:6px;
    padding:8px 18px;margin-bottom:16px}
  .li{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--mute)}
  .ll{width:26px;height:3px;border-radius:2px}
  .diag{width:100%;max-width:1220px;position:relative}

    transition:opacity .15s;z-index:100;max-width:300px;line-height:1.65}

  .tt{font-weight:700;color:var(--acc);font-size:12px;margin-bottom:5px}

<div class="tip" id="tip"><div class="tt" id="tt"></div><div id="tb"></div></div>

<script>
const tip=document.getElementById('tip'),tt=document.getElementById('tt'),tb=document.getElementById('tb');
document.getElementById('D').querySelectorAll('[data-tip]').forEach(el=>{
  el.style.cursor='pointer';
  el.addEventListener('mouseenter',e=>show(el,e));
  el.addEventListener('mousemove',mv);
  el.addEventListener('mouseleave',()=>tip.classList.remove('on'));
});
function show(el,e){
  const r=el.getAttribute('data-tip').split('\n');
  tt.textContent=r[0];
  tb.innerHTML=r.slice(1).map(l=>l?`<div style="color:#8eb5b8">${l}</div>`:'<br>').join('');
  tip.classList.add('on');mv(e);
}
function mv(e){
  const b=tip.parentElement.getBoundingClientRect();
  let x=e.clientX-b.left+18,y=e.clientY-b.top+18;
  if(x+310>b.width)x=e.clientX-b.left-310;
  if(y+320>b.height)y=e.clientY-b.top-320;
  tip.style.left=x+'px';tip.style.top=y+'px';
}
</script>
