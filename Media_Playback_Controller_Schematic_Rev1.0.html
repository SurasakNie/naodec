<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Playback Controller · Rev 1.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  /* === THEME START — NaoDec ===
     NaoDec house style: near-black teal canvas, warm pale gold accent,
     muted teal component outlines, semantic wire palette.
     Source: NaoDec_WS2815_LED_Controller_Rev1.6 design system. */
  :root {
    --bg-dark:          #060a0b;
    --bg-panel:         rgba(10, 18, 20, 0.95);
    --wire-12v:         #eaddaa;
    --wire-5v:          #c9a86a;
    --wire-3v3:         #a28854;
    --wire-gnd:         #4a6b6d;
    --wire-data:        #88e2d6;
    --wire-data2:       #ffffff;
    --wire-data3:       #7cb3ff;
    --wire-data4:       #c8a2e8;
    --wire-data5:       #f0997b;
    --wire-data6:       #97c459;
    --wire-data7:       #f0d060;
    --text-primary:     #ffffff;
    --text-secondary:   #8eb5b8;
    --accent:           #eaddaa;
    --border:           rgba(74, 107, 109, 0.6);
    --comp-fill:        #0f1a1c;
    --comp-fill-hover:  #142326;
    --comp-stroke:      #4a6b6d;
    --pin-dot:          #88e2d6;
    --warn:             #ff5555;
    --warn-bg:          #1f0a0a;
  }
  /* === THEME END === */
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }
  .schematic-container {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }
  .schematic-container.grabbing { cursor: grabbing; }
  .svg-wrapper {
    transform-origin: 0 0;
    will-change: transform;
    position: absolute;
    top: 0;
    left: 0;
  }
  .comp {
    fill: var(--comp-fill);
    stroke: var(--comp-stroke);
    stroke-width: 1.5;
    cursor: pointer;
    transition: all .2s ease;
  }
  .comp:hover {
    fill: #142326;
    stroke: var(--accent);
    stroke-width: 2;
  }
  .sec-border-dash { fill:none; stroke: var(--comp-stroke); stroke-width:1.5; stroke-dasharray:6 6; opacity: 0.8; }
  .w12v      { stroke:var(--wire-12v);  stroke-width:2.5; fill:none; }
  .w12v-bus  { stroke:var(--wire-12v);  stroke-width:4;   fill:none; }
  .wgnd      { stroke:var(--wire-gnd);  stroke-width:2.5; fill:none; }
  .wgnd-bus  { stroke:var(--wire-gnd);  stroke-width:4;   fill:none; }
  .w5v       { stroke:var(--wire-5v);   stroke-width:2;   fill:none; }
  .w5v-bus   { stroke:var(--wire-5v);   stroke-width:4;   fill:none; }
  .w3v3      { stroke:var(--wire-3v3);  stroke-width:2;   fill:none; }
  .w3v3-bus  { stroke:var(--wire-3v3);  stroke-width:4;   fill:none; }
  .wdata     { stroke:var(--wire-data);  stroke-width:2;  fill:none; }
  .wdata2    { stroke:var(--wire-data2); stroke-width:2;  fill:none; }
  .wdata3    { stroke:var(--wire-data3); stroke-width:2;  fill:none; }
  .wdata4    { stroke:var(--wire-data4); stroke-width:2;  fill:none; }
  .wdata5    { stroke:var(--wire-data5); stroke-width:2;  fill:none; }
  .wdata6    { stroke:var(--wire-data6); stroke-width:2;  fill:none; }
  .wdata7    { stroke:var(--wire-data7); stroke-width:2;  fill:none; }
  .j12v   { fill:var(--wire-12v); }
  .jgnd   { fill:var(--wire-gnd); }
  .j5v    { fill:var(--wire-5v);  }
  .j3v3   { fill:var(--wire-3v3); }
  .jdata  { fill:var(--wire-data); }
  .jdata2 { fill:var(--wire-data2); }
  .jdata3 { fill:var(--wire-data3); }
  .jdata4 { fill:var(--wire-data4); }
  .jdata5 { fill:var(--wire-data5); }
  .jdata6 { fill:var(--wire-data6); }
  .jdata7 { fill:var(--wire-data7); }
  .pin    { fill:var(--pin-dot); }
  .channel-label { font-family: 'Roboto Mono', ui-monospace, monospace; font-size: 9px; fill: var(--text-secondary); pointer-events: none; }
  polyline[data-info], line[data-info], path[data-info] { cursor: pointer; pointer-events: visibleStroke; }
  g[data-info], circle[data-info] { cursor: pointer; }
  polyline[data-info]:hover, line[data-info]:hover, path[data-info]:hover { stroke-width: 6; filter: brightness(1.4); }
  text { font-family: 'Roboto', sans-serif; font-weight: 500; }
  .bold-text { font-weight: 700; }
  .black-text { font-weight: 900; }
  .tip {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background: #060a0b;
    border: 1px solid var(--accent);
    border-radius: 4px; padding: 16px 24px;
    font-size: 15px; color: var(--text-primary);
    opacity:0; pointer-events:none; z-index:100;
    max-width:620px; text-align:center;
    transition: opacity .2s, transform .2s;
  }
  .tip.on { opacity:1; transform:translateX(-50%) translateY(-8px); }
  .tip .ttl { color:var(--accent); font-weight:900; margin-bottom:6px; font-size:16px; letter-spacing: 1px; text-transform: uppercase; }
  .tip .desc { line-height: 1.5; color: var(--text-secondary); font-weight: 500; }
  #zoom-controls {
    position: fixed; bottom: 30px; left: 30px;
    display: flex; gap: 6px; z-index: 100; align-items: center;
  }
  .zoom-btn {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 40px; height: 40px; border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; transition: all 0.2s;
    font-family: 'Roboto', sans-serif;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-btn:active { transform: scale(0.95); }
  .zoom-btn.fit-btn {
    width: auto; padding: 0 14px; font-size: 13px; letter-spacing: 1px; font-weight: 700;
  }
  #zoom-level {
    color: var(--text-primary); font-size: 13px; font-weight: 700;
    min-width: 52px; text-align: center; padding: 0 6px; user-select: none;
  }
  .zoom-shortcut-hint {
    position: fixed; bottom: 75px; left: 30px;
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    z-index: 100; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="schematic-container" id="schematic-container">
<div class="svg-wrapper" id="svg-wrapper">
<svg width="2400" height="1800" viewBox="-180 -15 2420 1815" xmlns="http://www.w3.org/2000/svg" id="schematic-svg">

  <!-- CANVAS REGISTRATION MARKS -->
  <g stroke="var(--text-secondary)" stroke-width="2" opacity="0.6">
    <path d="M -150 20 h 20 M -140 10 v 20"/>
    <path d="M 2210 20 h 20 M 2220 10 v 20"/>
    <path d="M -150 1840 h 20 M -140 1830 v 20"/>
    <path d="M 2210 1840 h 20 M 2220 1830 v 20"/>
  </g>

  <g transform="translate(80, 0)">

    <!-- ===========================
         TITLE BLOCK
         =========================== -->
    <g id="title-block">
      <text x="40" y="15" font-size="28" fill="var(--text-primary)" class="black-text" letter-spacing="4">P R O J E C T</text>
      <text x="40" y="38" font-size="14" fill="var(--accent)" class="bold-text" letter-spacing="1">MEDIA PLAYBACK CONTROLLER · Rev 1.0</text>
      <text x="40" y="56" font-size="13" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">ESP32-S3 Wi-Fi OSC controller · rotary encoder + Play / Pause / Stop</text>

      <!-- Legend Box -->
      <rect x="580" y="25" width="1420" height="46" rx="4" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="600"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-5v)"/>
      <text x="632"  y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">5V</text>
      <rect x="690"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-gnd)"/>
      <text x="722"  y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GND</text>
      <rect x="780"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-3v3)"/>
      <text x="812"  y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">3.3V</text>
      <rect x="880"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-data)"/>
      <text x="912"  y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">ENC A</text>
      <rect x="990"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-data2)"/>
      <text x="1022" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">ENC B</text>
      <rect x="1100" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data3)"/>
      <text x="1132" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">PLAY</text>
      <rect x="1210" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data4)"/>
      <text x="1242" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">PAUSE</text>
      <rect x="1330" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data5)"/>
      <text x="1362" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">STOP</text>
    </g>

    <!-- ===========================
         MAIN DIAGRAM AREA
         =========================== -->

    <!-- Section labels -->
    <text x="150"  y="406" font-size="13" fill="var(--accent)" text-anchor="middle" class="black-text" letter-spacing="1">5 V SUPPLY</text>
    <text x="1020" y="250" font-size="13" fill="var(--accent)" text-anchor="middle" class="black-text" letter-spacing="1">INPUT CONDITIONING · 10 kΩ PULL-UP + 100 nF DEBOUNCE</text>
    <text x="1435" y="318" font-size="13" fill="var(--accent)" text-anchor="middle" class="black-text" letter-spacing="1">OPERATOR PANEL</text>

    <!-- ===== PSU1 — USB 5 V / 2 A adapter ===== -->
    <g id="PSU1">
      <rect class="comp" data-info="PSU1|Regulated USB 5 V / 2 A wall adapter|Country-certified · USB-C output|Keep independent from 12 V LED rails"
            rx="2" x="40" y="420" width="220" height="130"/>
      <text x="150" y="478" font-size="20" fill="var(--accent)" text-anchor="middle" class="black-text">USB PSU</text>
      <text x="150" y="500" font-size="14" fill="var(--text-primary)" text-anchor="middle" class="bold-text">5 V · 2 A</text>
      <circle cx="260" cy="460" r="3" class="pin"/>
      <text x="252" y="455" font-size="11" fill="var(--wire-5v)" text-anchor="end" class="bold-text">+5V</text>
      <circle cx="260" cy="510" r="3" class="pin"/>
      <text x="252" y="515" font-size="11" fill="var(--wire-gnd)" text-anchor="end" class="bold-text">GND</text>
    </g>

    <!-- ===== U1 — ESP32-S3-DevKitC-1 ===== -->
    <g id="U1">
      <rect class="comp" data-info="U1|ESP32-S3-DevKitC-1 dev board|USB-C · 2.4 GHz Wi-Fi · N8R8 / N16R8|GPIO0/3/45/46 avoided (boot-strapping pins)"
            rx="2" x="340" y="190" width="380" height="620"/>
      <text x="530" y="494" font-size="22" fill="var(--accent)" text-anchor="middle" class="black-text">ESP32-S3</text>
      <text x="530" y="516" font-size="14" fill="var(--text-primary)" text-anchor="middle" class="bold-text">DevKitC-1 · N8R8 / N16R8</text>
      <text x="530" y="544" font-size="12" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">2.4 GHz Wi-Fi → OSC / UDP</text>
      <!-- left edge: 5 V / USB-C input -->
      <circle cx="340" cy="460" r="3" class="pin"/>
      <text x="352" y="464" font-size="11" fill="var(--wire-5v)" text-anchor="start" class="bold-text">5V · USB-C</text>
      <!-- right edge pins -->
      <circle cx="720" cy="280" r="3" class="pin"/>
      <text x="712" y="284" font-size="12" fill="var(--wire-3v3)" text-anchor="end" class="bold-text">3V3</text>
      <circle cx="720" cy="370" r="3" class="pin"/>
      <text x="712" y="374" font-size="12" fill="var(--wire-data)" text-anchor="end" class="bold-text">GPIO7</text>
      <circle cx="720" cy="460" r="3" class="pin"/>
      <text x="712" y="464" font-size="12" fill="var(--wire-data2)" text-anchor="end" class="bold-text">GPIO8</text>
      <circle cx="720" cy="550" r="3" class="pin"/>
      <text x="712" y="554" font-size="12" fill="var(--wire-data3)" text-anchor="end" class="bold-text">GPIO9</text>
      <circle cx="720" cy="640" r="3" class="pin"/>
      <text x="712" y="644" font-size="12" fill="var(--wire-data4)" text-anchor="end" class="bold-text">GPIO10</text>
      <circle cx="720" cy="730" r="3" class="pin"/>
      <text x="712" y="734" font-size="12" fill="var(--wire-data5)" text-anchor="end" class="bold-text">GPIO11</text>
      <circle cx="720" cy="790" r="3" class="pin"/>
      <text x="712" y="794" font-size="12" fill="var(--wire-gnd)" text-anchor="end" class="bold-text">GND</text>
    </g>

    <!-- ===== R1–R5 — 10 kΩ pull-ups to 3V3 ===== -->
    <g id="R1">
      <rect class="comp" data-info="R1|10 kΩ pull-up to 3V3|1% · 0.25 W metal film|Holds GPIO7 (ENC A) high"
            rx="2" x="803" y="320" width="34" height="40"/>
      <text x="820" y="344" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">10k</text>
    </g>
    <g id="R2">
      <rect class="comp" data-info="R2|10 kΩ pull-up to 3V3|1% · 0.25 W metal film|Holds GPIO8 (ENC B) high"
            rx="2" x="903" y="410" width="34" height="40"/>
      <text x="920" y="434" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">10k</text>
    </g>
    <g id="R3">
      <rect class="comp" data-info="R3|10 kΩ pull-up to 3V3|1% · 0.25 W metal film|Holds GPIO9 (PLAY) high"
            rx="2" x="1003" y="500" width="34" height="40"/>
      <text x="1020" y="524" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">10k</text>
    </g>
    <g id="R4">
      <rect class="comp" data-info="R4|10 kΩ pull-up to 3V3|1% · 0.25 W metal film|Holds GPIO10 (PAUSE) high"
            rx="2" x="1103" y="590" width="34" height="40"/>
      <text x="1120" y="614" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">10k</text>
    </g>
    <g id="R5">
      <rect class="comp" data-info="R5|10 kΩ pull-up to 3V3|1% · 0.25 W metal film|Holds GPIO11 (STOP) high"
            rx="2" x="1203" y="680" width="34" height="40"/>
      <text x="1220" y="704" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">10k</text>
    </g>

    <!-- ===== C1–C5 — 100 nF debounce caps to GND ===== -->
    <g id="C1">
      <rect class="comp" data-info="C1|100 nF debounce to GND|X7R · ≥25 V ceramic|~1 ms RC with R1"
            rx="2" x="803" y="386" width="34" height="30"/>
      <text x="820" y="406" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">100n</text>
    </g>
    <g id="C2">
      <rect class="comp" data-info="C2|100 nF debounce to GND|X7R · ≥25 V ceramic|~1 ms RC with R2"
            rx="2" x="903" y="476" width="34" height="30"/>
      <text x="920" y="496" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">100n</text>
    </g>
    <g id="C3">
      <rect class="comp" data-info="C3|100 nF debounce to GND|X7R · ≥25 V ceramic|~1 ms RC with R3"
            rx="2" x="1003" y="566" width="34" height="30"/>
      <text x="1020" y="586" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">100n</text>
    </g>
    <g id="C4">
      <rect class="comp" data-info="C4|100 nF debounce to GND|X7R · ≥25 V ceramic|~1 ms RC with R4"
            rx="2" x="1103" y="656" width="34" height="30"/>
      <text x="1120" y="676" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">100n</text>
    </g>
    <g id="C5">
      <rect class="comp" data-info="C5|100 nF debounce to GND|X7R · ≥25 V ceramic|~1 ms RC with R5"
            rx="2" x="1203" y="746" width="34" height="30"/>
      <text x="1220" y="766" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">100n</text>
    </g>

    <!-- ===== Operator controls ===== -->
    <g id="ENC1">
      <rect class="comp" data-info="ENC1|EC11 rotary encoder, 20 detent|Volume · A=GPIO7 B=GPIO8 C=GND|Panel mount"
            rx="2" x="1340" y="340" width="190" height="150"/>
      <text x="1435" y="406" font-size="16" fill="var(--accent)" text-anchor="middle" class="black-text">ENC1</text>
      <text x="1435" y="424" font-size="11" fill="var(--text-primary)" text-anchor="middle" class="bold-text">EC11 · 20 detent</text>
      <text x="1356" y="366" font-size="10" fill="var(--wire-data)"  text-anchor="start" class="bold-text">A</text>
      <text x="1356" y="456" font-size="10" fill="var(--wire-data2)" text-anchor="start" class="bold-text">B</text>
      <text x="1524" y="419" font-size="10" fill="var(--wire-gnd)"  text-anchor="end" class="bold-text">C · GND</text>
    </g>
    <g id="SW1">
      <rect class="comp" data-info="SW1|Play pushbutton (NO momentary)|GPIO9 · panel mount|Active-low to GND"
            rx="2" x="1340" y="520" width="190" height="60"/>
      <text x="1435" y="546" font-size="14" fill="var(--accent)" text-anchor="middle" class="black-text">SW1</text>
      <text x="1435" y="564" font-size="11" fill="var(--text-primary)" text-anchor="middle" class="bold-text">PLAY</text>
    </g>
    <g id="SW2">
      <rect class="comp" data-info="SW2|Pause pushbutton (NO momentary)|GPIO10 · panel mount|Active-low to GND"
            rx="2" x="1340" y="610" width="190" height="60"/>
      <text x="1435" y="636" font-size="14" fill="var(--accent)" text-anchor="middle" class="black-text">SW2</text>
      <text x="1435" y="654" font-size="11" fill="var(--text-primary)" text-anchor="middle" class="bold-text">PAUSE</text>
    </g>
    <g id="SW3">
      <rect class="comp" data-info="SW3|Stop pushbutton (NO momentary)|GPIO11 · panel mount|Active-low to GND"
            rx="2" x="1340" y="700" width="190" height="60"/>
      <text x="1435" y="726" font-size="14" fill="var(--accent)" text-anchor="middle" class="black-text">SW3</text>
      <text x="1435" y="744" font-size="11" fill="var(--text-primary)" text-anchor="middle" class="bold-text">STOP</text>
    </g>

    <!-- ===========================
         WIRING
         =========================== -->

    <!-- 5 V supply: PSU1 → U1 USB-C input -->
    <line x1="260" y1="460" x2="340" y2="460" class="w5v" data-info="BUS_5V|PSU1 +5V → U1 USB-C|USB-C 5 V (J1)"/>
    <text x="300" y="452" class="channel-label" text-anchor="middle">USB-C 5V · J1</text>

    <!-- 3V3 pull-up bus -->
    <line x1="720" y1="280" x2="1220" y2="280" class="w3v3-bus" data-info="BUS_3V3|3.3 V pull-up bus|ESP32 3V3 → R1–R5"/>
    <circle cx="820"  cy="280" r="3.5" class="j3v3" data-info="BUS_3V3|R1 pull-up tap"/>
    <circle cx="920"  cy="280" r="3.5" class="j3v3" data-info="BUS_3V3|R2 pull-up tap"/>
    <circle cx="1020" cy="280" r="3.5" class="j3v3" data-info="BUS_3V3|R3 pull-up tap"/>
    <circle cx="1120" cy="280" r="3.5" class="j3v3" data-info="BUS_3V3|R4 pull-up tap"/>
    <circle cx="1220" cy="280" r="3.5" class="j3v3" data-info="BUS_3V3|R5 pull-up tap"/>

    <!-- ===== Channel 1 — ENC A / GPIO7 (wdata) ===== -->
    <line x1="820" y1="320" x2="820" y2="280" class="w3v3"  data-info="BUS_3V3|bus → R1 pull-up|24 AWG RED"/>
    <line x1="820" y1="360" x2="820" y2="370" class="wdata" data-info="ENC_A|R1 → GPIO7 node|24–26 AWG GREEN"/>
    <line x1="720" y1="370" x2="820" y2="370" class="wdata" data-info="ENC_A|U1 GPIO7 → node|24–26 AWG GREEN"/>
    <line x1="820" y1="370" x2="820" y2="386" class="wdata" data-info="ENC_A|node → C1 debounce|24–26 AWG GREEN"/>
    <line x1="820" y1="416" x2="820" y2="426" class="wgnd"  data-info="GND|C1 → ground|24 AWG BLACK"/>
    <path d="M 820,426 L 820,430 M 811,430 L 829,430 M 814,434 L 826,434 M 817,438 L 823,438" class="deco" stroke="var(--wire-gnd)" stroke-width="1.5" fill="none"/>

<!-- Zoom Controls -->
<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in" title="Zoom In (Ctrl+Shift++)">+</button>
  <button class="zoom-btn" id="zoom-out" title="Zoom Out (Ctrl+Shift+−)">−</button>
  <span id="zoom-level">100%</span>
  <button class="zoom-btn fit-btn" id="zoom-fit" title="Fit to Screen (Ctrl+Shift+0)">FIT</button>
  <button class="zoom-btn fit-btn" id="export-svg" title="Export as Standalone SVG" style="margin-left: 12px; color: var(--wire-data);">Export SVG</button>
  <button class="zoom-btn fit-btn" id="export-png" title="Export as High-Res PNG" style="color: var(--wire-5v);">Export PNG</button>
</div>
<div class="zoom-shortcut-hint">Ctrl+Shift+ +/−/0 · Scroll to zoom · Drag to pan</div>

<!-- Tooltip -->
<div class="tip" id="tip">
  <div class="ttl" id="tipTtl">Component Name</div>
  <div class="desc" id="tipDesc">Description</div>
</div>

<script>
  const tip = document.getElementById('tip');
  const tipTtl = document.getElementById('tipTtl');
  const tipDesc = document.getElementById('tipDesc');
  document.querySelectorAll('[data-info]').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      const t = e.target.closest('[data-info]') || e.target;
      const info = t.getAttribute('data-info');
      if (info) {
        const parts = info.split('|');
        tipTtl.textContent = parts[0];
        tipDesc.textContent = '';
        parts.slice(1).forEach((seg, i) => {
          if (i > 0) tipDesc.appendChild(document.createElement('br'));
          tipDesc.appendChild(document.createTextNode(seg));
        });
        tip.classList.add('on');
      }
    });
    el.addEventListener('mouseleave', () => tip.classList.remove('on'));
  });
  const container = document.getElementById('schematic-container');
  const wrapper = document.getElementById('svg-wrapper');
  const zoomLevelEl = document.getElementById('zoom-level');
  let scale = 1, panX = 0, panY = 0, isPanning = false, startX, startY;
  const MIN_SCALE = 0.1, MAX_SCALE = 4, ZOOM_STEP = 0.15;
  const SVG_W = 2400, SVG_H = 1800;
  function updateTransform() {
    wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    zoomLevelEl.textContent = Math.round(scale * 100) + '%';
  }
  function zoomTo(ns, cx, cy) {
    ns = Math.max(MIN_SCALE, Math.min(MAX_SCALE, ns));
    if (cx !== undefined && cy !== undefined) {
      const r = ns / scale;
      panX = cx - (cx - panX) * r;
      panY = cy - (cy - panY) * r;
    }
    scale = ns;
    updateTransform();
  }
  function zoomIn()  { const r = container.getBoundingClientRect(); zoomTo(scale * (1 + ZOOM_STEP), r.width / 2, r.height / 2); }
  function zoomOut() { const r = container.getBoundingClientRect(); zoomTo(scale * (1 - ZOOM_STEP), r.width / 2, r.height / 2); }
  function fitToScreen() {
    const r = container.getBoundingClientRect();
    scale = Math.min(r.width / SVG_W, r.height / SVG_H) * 0.95;
    panX = (r.width - SVG_W * scale) / 2;
    panY = (r.height - SVG_H * scale) / 2;
    updateTransform();
  }
  document.getElementById('zoom-in').addEventListener('click', zoomIn);
  document.getElementById('zoom-out').addEventListener('click', zoomOut);
  document.getElementById('zoom-fit').addEventListener('click', fitToScreen);
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const r = container.getBoundingClientRect();
    zoomTo(scale * (e.deltaY > 0 ? (1 - ZOOM_STEP) : (1 + ZOOM_STEP)), e.clientX - r.left, e.clientY - r.top);
  }, { passive: false });
  container.addEventListener('mousedown', (e) => {
    if (e.target.closest('.comp') || e.target.closest('#zoom-controls')) return;
    isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY;
    container.classList.add('grabbing');
  });
  window.addEventListener('mousemove', (e) => { if (!isPanning) return; panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); });
  window.addEventListener('mouseup', () => { isPanning = false; container.classList.remove('grabbing'); });
  let lastTouchDist = 0;
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) { isPanning = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; }
    else if (e.touches.length === 2) { e.preventDefault(); isPanning = false; const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY; lastTouchDist = Math.sqrt(dx*dx+dy*dy); }
  }, { passive: false });
  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isPanning) { panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY; updateTransform(); }
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy), r = container.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left, cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
      zoomTo(scale * (dist / lastTouchDist), cx, cy); lastTouchDist = dist;
    }
  }, { passive: false });
  container.addEventListener('touchend', () => { isPanning = false; });
  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey) {
      if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
      else if (e.key === '-' || e.key === '_') { e.preventDefault(); zoomOut(); }
      else if (e.key === '0' || e.key === ')') { e.preventDefault(); fitToScreen(); }
    }
  });
  window.addEventListener('load', () => { (document.fonts?.ready || Promise.resolve()).then(fitToScreen); });
  function getSvgStringThemed() {
    // Themed (matches on-screen) — used for PNG export.
    const clone = document.getElementById('schematic-svg').cloneNode(true);
    const styleTag = document.querySelector('style');
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const style = document.createElementNS("http://www.w3.org/2000/svg", "style");
    style.textContent = styleTag ? styleTag.innerHTML : '';
    defs.appendChild(style);
    const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-dark').trim();
    bgRect.setAttribute("width", "100%"); bgRect.setAttribute("height", "100%"); bgRect.setAttribute("fill", bgColor);
    if (bgColor) clone.insertBefore(bgRect, clone.firstChild);
    clone.insertBefore(defs, clone.firstChild);
    if (!clone.getAttribute("xmlns")) clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    return new XMLSerializer().serializeToString(clone);
  }
  function getSvgStringPrint() {
    // Print/embed export — black strokes & text on transparent background.
    // No <rect> background. Overrides every themed color via injected !important style.
    const clone = document.getElementById('schematic-svg').cloneNode(true);
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const style = document.createElementNS("http://www.w3.org/2000/svg", "style");
    // M6: use attribute-prefix selectors so adding --wire-data8 / .wdata8 (or
    // any new wire class) is picked up automatically without editing print CSS.
    style.textContent = `
      svg { background: transparent !important; }
      .comp, .sec-border-dash,
      [class~="w12v"], [class~="w12v-bus"],
      [class~="wgnd"], [class~="wgnd-bus"],
      [class~="w5v"],  [class~="w5v-bus"],
      [class~="w3v3"], [class~="w3v3-bus"],
      [class*="wdata"] {
        stroke: #000 !important;
        fill: none !important;
      }
      [class^="j"], [class*=" j"], .pin {
        fill: #000 !important;
        stroke: none !important;
      }
      text { fill: #000 !important; }
      line[stroke], path[stroke], polyline[stroke], rect[stroke], circle[stroke] {
        stroke: #000 !important;
      }
      [fill]:not(text):not([class^="j"]):not([class*=" j"]):not(.pin) {
        fill: none !important;
      }
    `;
    defs.appendChild(style);
    clone.insertBefore(defs, clone.firstChild);
    if (!clone.getAttribute("xmlns")) clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    return new XMLSerializer().serializeToString(clone);
  }
  function exportFilename(ext) {
    const title = document.title.replace(/[\\/:*?"<>|]/g, '_') || 'Schematic_Export';
    return title + '.' + ext;
  }
  document.getElementById('export-svg').addEventListener('click', () => {
    const blob = new Blob([getSvgStringPrint()], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a"); link.href = url; link.download = exportFilename('svg');
    document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
  });
  document.getElementById('export-png').addEventListener('click', () => {
    const btn = document.getElementById('export-png');
    const origText = btn.textContent; btn.textContent = "WAIT..."; btn.style.opacity = "0.5";
    const canvas = document.createElement("canvas"); canvas.width = SVG_W; canvas.height = SVG_H;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    const url = URL.createObjectURL(new Blob([getSvgStringThemed()], {type: "image/svg+xml;charset=utf-8"}));
    img.onload = function() {
      ctx.drawImage(img, 0, 0); URL.revokeObjectURL(url);
      try {
        const link = document.createElement("a"); link.href = canvas.toDataURL("image/png", 1.0);
        link.download = exportFilename('png');
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      } catch (e) {
        console.error("PNG export error:", e.message);
      } finally { btn.textContent = origText; btn.style.opacity = "1"; }
    };
    img.onerror = function() {
      btn.textContent = origText; btn.style.opacity = "1";
      URL.revokeObjectURL(url);
      console.error("PNG export: SVG image failed to load");
    };
    img.src = url;
  });
</script>
