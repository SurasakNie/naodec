<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>NaoDec Controller Box Configurations — Rev 1.1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  :root {
    --bg-dark:        #060a0b;
    --bg-panel:       rgba(10,18,20,0.95);
    --wire-12v:       #eaddaa;
    --wire-5v:        #c9a86a;
    --wire-gnd:       #4a6b6d;
    --wire-data:      #88e2d6;
    --wire-ac:        #c084fc;
    --text-primary:   #ffffff;
    --text-secondary: #8eb5b8;
    --accent:         #eaddaa;
    --border:         rgba(74,107,109,0.6);
    --comp-fill:      #0f1a1c;
    --comp-stroke:    #4a6b6d;
    --warn:           #ff5555;
    --ok:             #66bb6a;
    --box1:           #0d1f22;
    --box2:           #0f1d14;
    --box-border1:    rgba(100,160,170,0.5);
    --box-border2:    rgba(80,150,100,0.5);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }
  .schematic-container {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }
  .schematic-container.grabbing { cursor: grabbing; }
  .svg-wrapper {
    transform-origin: 0 0;
    will-change: transform;
    position: absolute;
    top: 0; left: 0;
  }
  .comp {
    fill: var(--comp-fill);
    stroke: var(--comp-stroke);
    stroke-width: 1.5;
    cursor: pointer;
    transition: all .2s ease;
  }
  .comp:hover { stroke: var(--accent); stroke-width: 2; }
  .comp:hover ~ .comp-label { fill: var(--accent); }
  .bold-text { font-weight: 700; }
  .black-text { font-weight: 900; }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'Roboto', sans-serif;
    font-size: 12px;
    color: var(--text-primary);
    pointer-events: none;
    z-index: 1000;
    max-width: 320px;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .tooltip-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .tooltip-line {
    font-size: 11px;
    color: var(--text-secondary);
    margin: 2px 0;
    line-height: 1.4;
  }

  /* Controls */
  .controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
  }
  .ctrl-btn {
    width: 36px; height: 36px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .ctrl-btn:hover { background: rgba(74,107,109,0.4); }

  /* Legend */
  .legend {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    z-index: 100;
  }
  .legend-row { display:flex; align-items:center; gap:8px; margin:3px 0; color:var(--text-secondary); }
  .legend-line { width:28px; height:3px; border-radius:2px; }
</style>
</head>

<!-- Controls -->

  <button class="ctrl-btn" id="zoomIn" title="Zoom in">+</button>
  <button class="ctrl-btn" id="zoomOut" title="Zoom out">−</button>
  <button class="ctrl-btn" id="zoomFit" title="Fit to screen" style="font-size:12px">⊞</button>
</div>

<script>
  const container = document.getElementById('container');
  const wrapper   = document.getElementById('wrapper');
  const tooltip   = document.getElementById('tooltip');
  const ttTitle   = document.getElementById('tt-title');
  const ttBody    = document.getElementById('tt-body');

  let scale = 0.42, tx = 0, ty = 0;
  let isDragging = false, startX, startY, startTx, startTy;

  function applyTransform() {
    wrapper.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function fitToScreen() {
    const W = container.clientWidth, H = container.clientHeight;
    const svgW = 2000, svgH = 2780;
    scale = Math.min(W/svgW, H/svgH) * 0.96;
    tx = (W - svgW*scale) / 2;
    ty = (H - svgH*scale) / 2;
    applyTransform();
  }
  fitToScreen();

  container.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    tx = mx - (mx - tx) * factor;
    ty = my - (my - ty) * factor;
    scale *= factor;
    scale = Math.max(0.1, Math.min(8, scale));
    applyTransform();
  }, {passive: false});

  container.addEventListener('mousedown', e => {
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
    container.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    isDragging = false;
    container.classList.remove('grabbing');
  });

  document.getElementById('zoomIn').addEventListener('click', () => {
    const W = container.clientWidth, H = container.clientHeight;
    tx = W/2 - (W/2 - tx)*1.2; ty = H/2 - (H/2 - ty)*1.2;
    scale = Math.min(scale*1.2, 8); applyTransform();
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    const W = container.clientWidth, H = container.clientHeight;
    tx = W/2 - (W/2 - tx)*0.83; ty = H/2 - (H/2 - ty)*0.83;
    scale = Math.max(scale*0.83, 0.1); applyTransform();
  });
  document.getElementById('zoomFit').addEventListener('click', fitToScreen);

  // Tooltip
  document.getElementById('schematic').addEventListener('click', e => {
    const el = e.target.closest('[data-info]');
    if (!el) { tooltip.style.display = 'none'; return; }
    const parts = el.getAttribute('data-info').split('|');
    ttTitle.textContent = parts[0] || '';
    ttBody.innerHTML = parts.slice(1).map(l =>
      `<div class="tooltip-line">${l}</div>`).join('');
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(e.clientX + 14, window.innerWidth - 340) + 'px';
    tooltip.style.top  = Math.min(e.clientY + 14, window.innerHeight - 200) + 'px';
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('[data-info]') && !e.target.closest('.tooltip'))
      tooltip.style.display = 'none';
  });
</script>
