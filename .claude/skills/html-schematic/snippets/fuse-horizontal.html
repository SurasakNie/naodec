<!-- Horizontal in-line fuse (70×20 box, centered label, sub-caption below).
     Canonical use: 5×20 mm slow-blow inline fuse mounted in a horizontal wire run.
     Wire Router connects the routed net through the body (Sub-Agent 6 rule 11
     "Series component through-wires" — a <line> in the wire class spans the
     terminal coordinates so the wire doesn't visually break at the box edges).

     Substitutions:
       {ID}          — designator, e.g. "F1", "F3"
       {X} {Y}       — top-left corner of the 70×20 rect
       {LABEL}       — short value rendered centered inside the box, e.g. "1A T1A"
       {SUBCAPTION}  — slow-blow note rendered below the box, e.g. "slow-blow"
       {DATA_INFO}   — pipe-separated tooltip: "F1|Inline fuse 1 A slow-blow (T1A)|5×20 mm · 22 AWG|ESP sub-branch protection"

     Per M8: class="comp" + data-info go on the <rect>, not the <g>. -->
<g id="{ID}">
  <rect class="comp" data-info="{DATA_INFO}"
        x="{X}" y="{Y}" width="70" height="20" rx="2"/>
  <!-- Inner label — horizontal, centered in the box -->
  <text x="{X + 35}" y="{Y + 13}" font-size="11" fill="var(--wire-12v)"
        text-anchor="middle" class="bold-text">{LABEL}</text>
  <!-- Sub-caption — below the box -->
  <text x="{X + 35}" y="{Y + 33}" font-size="9" fill="var(--text-secondary)"
        text-anchor="middle">{SUBCAPTION}</text>
  <!-- Designator label — above the box -->
  <text x="{X + 35}" y="{Y - 6}" font-size="12" fill="var(--accent)"
        text-anchor="middle" class="black-text">{ID}</text>
</g>
