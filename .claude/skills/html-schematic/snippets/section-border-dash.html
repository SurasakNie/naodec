<!-- Dashed section grouping border — use to visually enclose a functional area -->
<!-- Replace {X} {Y} {W} {H} with position and size in SVG user units            -->
<!-- data-info="Section Name|Optional description" for hover tooltip              -->
<rect x="{X}" y="{Y}" width="{W}" height="{H}" rx="4"
      class="sec-border-dash"
      data-info="{Section Name}|{Optional description}"/>
