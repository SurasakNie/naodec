<rect x="{X}" y="{Y}" width="{W}" height="44" rx="2"
      fill="none" stroke="var(--warn)" stroke-width="2"/>
<text x="{X+W/2}" y="{Y+18}" font-size="12" fill="var(--warn)"
      text-anchor="middle" class="black-text" letter-spacing="1">⚠ {SHORT WARNING} ⚠</text>
<text x="{X+W/2}" y="{Y+36}" font-size="11" fill="var(--warn)"
      text-anchor="middle" class="bold-text">{Detail line}</text>
