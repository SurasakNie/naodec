name: Update index.html

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate index.html
        id: gen
        run: |
          set -euo pipefail
          tmp=$(mktemp)
          {
            cat <<'HEAD'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>NaoDec — Wiring and Schematics Index</title>
            <style>
              :root {
                color-scheme: light dark;
                --bg:        #ffffff;
                --fg:        #222222;
                --muted:     #888888;
                --rule:      #dddddd;
                --link:      #0645ad;
                --link-hover:#0b63d6;
                --code-bg:   rgba(128,128,128,0.15);
              }
              @media (prefers-color-scheme: dark) {
                :root {
                  --bg:        #0b1113;
                  --fg:        #e6edef;
                  --muted:     #8eb5b8;
                  --rule:      rgba(142, 181, 184, 0.25);
                  --link:      #88e2d6;
                  --link-hover:#eaddaa;
                  --code-bg:   rgba(142, 181, 184, 0.15);
                }
              }
              body { font-family: system-ui, sans-serif; max-width: 720px;
                     margin: 3rem auto; padding: 0 1rem; line-height: 1.6;
                     background: var(--bg); color: var(--fg); }
              h1 { border-bottom: 1px solid var(--rule); padding-bottom: .4rem; }
              h2 { font-size: 1.1rem; margin-top: 2rem; border-bottom: 1px solid var(--rule);
                   padding-bottom: .3rem; }
              ul { padding-left: 1.2rem; }
              li { margin: .3rem 0; }
              a { color: var(--link); text-decoration: none; }
              a:hover { color: var(--link-hover); text-decoration: underline; }
              footer { margin-top: 3rem; color: var(--muted); font-size: .85rem; }
              code { background: var(--code-bg); padding: 1px 4px; border-radius: 3px; }
            </style>
          </head>
          <body>
            <h1>NaoDec — Wiring and Schematics Index</h1>
            <p>Rendered HTML and selected Markdown documents in this repository, grouped by type. Click to open.</p>
          HEAD

            # Group assignment by filename — first matching pattern wins.
            # *Series_Coil_Build* must precede *Series_Coil* (build guide vs schematic).
            categorize() {
              case "$1" in
                *Series_Coil_Build*)                                        echo guides ;;
                *Schematic*|*LED_Controller*|*Series_Coil*|Simple_WS2815*)  echo schematics ;;
                *3D_*)                                                      echo 3d ;;
                *Face_Edge_Marking*|*Controller_Box*|*Build_and_Max_Setup*) echo guides ;;
                *)                                                          echo other ;;
              esac
            }

            files=$( {
              ls *.html 2>/dev/null | grep -v '^index\.html$' || true
              printf '%s\n' NaoDec_Media_Playback_Controller_Build_and_Max_Setup.md
            } | sort )

            emit_group() {
              key=$1; title=$2
              members=$(printf '%s\n' "$files" | while read -r f; do
                if [ -f "$f" ] && [ "$(categorize "$f")" = "$key" ]; then
                  printf '%s\n' "$f"
                fi
              done)
              [ -n "$members" ] || return 0
              printf '  <h2>%s</h2>\n  <ul>\n' "$title"
              printf '%s\n' "$members" | while read -r f; do
                pretty=$(printf '%s' "$f" | sed 's/\.[^.]*$//; s/_/ /g')
                printf '    <li><a href="%s">%s</a></li>\n' "$f" "$pretty"
              done
              printf '  </ul>\n'
            }

            emit_group schematics 'Schematics'
            emit_group 3d         '3D Structure &amp; LED Mapping'
            emit_group guides     'Build &amp; Assembly Guides'
            emit_group other      'Other Documents'

            cat <<'TAIL'
            <footer>Auto-generated — see <code>.github/workflows/update-index.yml</code>.</footer>
          </body>
          </html>
          TAIL
          } > "$tmp"

          if ! cmp -s "$tmp" index.html 2>/dev/null; then
            mv "$tmp" index.html
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.gen.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: regenerate index.html"
          git push
