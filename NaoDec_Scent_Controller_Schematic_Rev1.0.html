<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaoDec Scent Controller · Rev 1.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  /* === THEME START — Cyberpunk (remapped to schematic contract) === */
  :root {
    --bg-dark:          #0A0A0F;
    --bg-panel:         rgba(26, 26, 38, 0.95);
    --wire-12v:         #FF6B2B;
    --wire-5v:          #F5E642;
    --wire-3v3:         #BF5FFF;
    --wire-gnd:         #606080;
    --wire-data:        #0FF0B3;
    --wire-data2:       #E0E0F0;
    --wire-data3:       #4DBBFF;
    --wire-data4:       #FF2D78;
    --wire-data5:       #FF9E6B;
    --wire-data6:       #F8EE7A;
    --wire-data7:       #D48FFF;
    --text-primary:     #E0E0F0;
    --text-secondary:   #8888A0;
    --accent:           #0FF0B3;
    --border:           rgba(44, 44, 64, 0.6);
    --comp-fill:        #14141F;
    --comp-fill-hover:  #22222E;
    --comp-stroke:      #2C2C40;
    --pin-dot:          #0FF0B3;
    --warn:             #FF2D78;
    --warn-bg:          #1F0A14;
  }
  /* === THEME END === */
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }
  .schematic-container { width:100%; height:100vh; overflow:hidden; position:relative; cursor:grab; }
  .schematic-container.grabbing { cursor: grabbing; }
  .svg-wrapper { transform-origin:0 0; will-change:transform; position:absolute; top:0; left:0; }
  .comp { fill:none; stroke:var(--comp-stroke); stroke-width:1.5; cursor:pointer; transition:all .2s ease; }
  .comp:hover { fill:none; stroke:var(--accent); stroke-width:2; }
  .sec-border-dash { fill:none; stroke:var(--comp-stroke); stroke-width:1.5; stroke-dasharray:6 6; opacity:0.8; }
  .w12v     { stroke:var(--wire-12v); stroke-width:2.5; fill:none; }
  .w12v-bus { stroke:var(--wire-12v); stroke-width:4;   fill:none; }
  .wgnd     { stroke:var(--wire-gnd); stroke-width:2.5; fill:none; }
  .wgnd-bus { stroke:var(--wire-gnd); stroke-width:4;   fill:none; }
  .w5v      { stroke:var(--wire-5v);  stroke-width:2;   fill:none; }
  .w5v-bus  { stroke:var(--wire-5v);  stroke-width:4;   fill:none; }
  .w3v3     { stroke:var(--wire-3v3); stroke-width:2;   fill:none; }
  .w3v3-bus { stroke:var(--wire-3v3); stroke-width:4;   fill:none; }
  .wdata    { stroke:var(--wire-data);  stroke-width:2; fill:none; }
  .wdata2   { stroke:var(--wire-data2); stroke-width:2; fill:none; }
  .wdata3   { stroke:var(--wire-data3); stroke-width:2; fill:none; }
  .wdata4   { stroke:var(--wire-data4); stroke-width:2; fill:none; }
  .wdata5   { stroke:var(--wire-data5); stroke-width:2; fill:none; }
  .wdata6   { stroke:var(--wire-data6); stroke-width:2; fill:none; }
  .wdata7   { stroke:var(--wire-data7); stroke-width:2; fill:none; }
  .j12v   { fill:var(--wire-12v); }
  .jgnd   { fill:var(--wire-gnd); }
  .j5v    { fill:var(--wire-5v);  }
  .j3v3   { fill:var(--wire-3v3); }
  .jdata  { fill:var(--wire-data); }
  .jdata2 { fill:var(--wire-data2); }
  .jdata3 { fill:var(--wire-data3); }
  .jdata4 { fill:var(--wire-data4); }
  .jdata5 { fill:var(--wire-data5); }
  .jdata6 { fill:var(--wire-data6); }
  .jdata7 { fill:var(--wire-data7); }
  .pin    { fill:var(--pin-dot); }
  polyline[data-info], line[data-info], path[data-info] { cursor:pointer; pointer-events:visibleStroke; }
  polyline[data-info]:hover, line[data-info]:hover, path[data-info]:hover { stroke-width:6; filter:brightness(1.4); }
  text { font-family:'Roboto', sans-serif; font-weight:500; }
  .bold-text { font-weight:700; }
  .black-text { font-weight:900; }
  .tip {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--bg-dark); border:1px solid var(--accent);
    border-radius:4px; padding:16px 24px;
    font-size:15px; color:var(--text-primary);
    opacity:0; pointer-events:none; z-index:100;
    max-width:620px; text-align:center;
    transition: opacity .2s, transform .2s;
  }
  .tip.on { opacity:1; transform:translateX(-50%) translateY(-8px); }
  .tip .ttl { color:var(--accent); font-weight:900; margin-bottom:6px; font-size:16px; letter-spacing:1px; text-transform:uppercase; }
  .tip .desc { line-height:1.5; color:var(--text-secondary); font-weight:500; }
  #zoom-controls { position:fixed; bottom:30px; left:30px; display:flex; gap:6px; z-index:100; align-items:center; }
  .zoom-btn {
    background:var(--bg-panel); border:1px solid var(--border); color:var(--text-primary);
    width:40px; height:40px; border-radius:4px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:700; transition:all 0.2s;
    font-family:'Roboto', sans-serif;
  }
  .zoom-btn:hover { border-color:var(--accent); color:var(--accent); }
  .zoom-btn:active { transform:scale(0.95); }
  .zoom-btn.fit-btn { width:auto; padding:0 14px; font-size:13px; letter-spacing:1px; font-weight:700; }
  #zoom-level { color:var(--text-primary); font-size:13px; font-weight:700; min-width:52px; text-align:center; padding:0 6px; user-select:none; }
  .zoom-shortcut-hint { position:fixed; bottom:75px; left:30px; font-size:11px; font-weight:500; color:var(--text-secondary); z-index:100; letter-spacing:0.5px; }
</style>
</head>
<body>
<div class="schematic-container" id="schematic-container">
<div class="svg-wrapper" id="svg-wrapper">
<svg width="2400" height="1800" viewBox="-180 -15 2420 1815" xmlns="http://www.w3.org/2000/svg" id="schematic-svg">

  <g stroke="var(--text-secondary)" stroke-width="2" opacity="0.6">
    <path d="M -150 20 h 20 M -140 10 v 20"/>
    <path d="M 2210 20 h 20 M 2220 10 v 20"/>
    <path d="M -150 1840 h 20 M -140 1830 v 20"/>
    <path d="M 2210 1840 h 20 M 2220 1830 v 20"/>
  </g>

  <g transform="translate(80, 0)">

    <!-- TITLE BLOCK -->
    <g id="title-block">
      <text x="40" y="15" font-size="28" fill="var(--text-primary)" class="black-text" letter-spacing="4">N A O D E C   S C E N T   C O N T R O L L E R</text>
      <text x="40" y="38" font-size="14" fill="var(--accent)" class="bold-text" letter-spacing="1">Electronics Schematic · Rev 1.0 · 2026-05-14</text>
      <text x="40" y="56" font-size="13" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">12V PSU → 4× WLED-driven ultrasonic atomizers (113 kHz piezo) via ESP32-S3-Relay-6CH</text>

      <rect x="780" y="25" width="1220" height="46" rx="4" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="800"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-12v)"/>
      <text x="832"  y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">12V</text>
      <rect x="880"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-5v)"/>
      <text x="912"  y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">5V</text>
      <rect x="950"  y="46" width="24" height="3" rx="1.5" fill="var(--wire-gnd)"/>
      <text x="982"  y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GND</text>
      <rect x="1030" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data)"/>
      <text x="1062" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH1 (GPIO1)</text>
      <rect x="1170" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data2)"/>
      <text x="1202" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH2 (GPIO2)</text>
      <rect x="1310" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data3)"/>
      <text x="1342" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH3 (GPIO41)</text>
      <rect x="1460" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data4)"/>
      <text x="1492" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH4 (GPIO42)</text>
      <text x="1620" y="52" font-size="11" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">RED=18AWG trunk · 2.5w=22AWG · 2w=signal</text>
    </g>

    <!-- WARNING BANNER — placed between GND bus (y=1020) and bottom panels (y=1080) -->
    <rect x="494" y="1013" width="921" height="22" rx="2" fill="none" stroke="var(--warn)" stroke-width="2"/>
    <text x="955" y="1029" font-size="12" fill="var(--warn)" text-anchor="middle" class="black-text" letter-spacing="2">⚠ PRE-SET BUCK Vout = 5.00 V (NO LOAD) BEFORE CONNECTING COM BUS · WLED Config → Hardware → Relay GPIO = −1 ⚠</text>

    <!-- ===========================
         MAIN DIAGRAM (y 110…1010)
         =========================== -->

    <!-- ===== POWER SOURCE (Column A, x 60-510) ===== -->
    <g id="PSU1">
      <rect class="comp" rx="2" x="75" y="180" width="165" height="110"
            data-info="PSU1|DC industrial PSU|12 V · 8.2 A · DIN rail|Oversized — 2–3 A would suffice"/>
      <text x="150" y="205" font-size="18" fill="var(--accent)" text-anchor="middle" class="black-text">PSU1</text>
      <text x="150" y="225" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="bold-text">DC PSU 12 V</text>
      <text x="150" y="244" font-size="11" fill="var(--text-secondary)" text-anchor="middle">8.2 A · DIN rail</text>
      <text x="150" y="262" font-size="10" fill="var(--text-secondary)" text-anchor="middle">(2–3 A would suffice)</text>
      <text x="245" y="216" font-size="10" fill="var(--wire-12v)" class="bold-text">V+</text>
      <text x="245" y="284" font-size="10" fill="var(--wire-gnd)" class="bold-text">V−</text>
      <circle cx="240" cy="220" r="3" class="pin"/>
      <circle cx="240" cy="270" r="3" class="pin"/>
    </g>

    <g id="F_MAIN">
      <rect class="comp" rx="2" x="280" y="210" width="70" height="20"
            data-info="F_MAIN|Inline fuse 2 A slow-blow (T2A)|5×20 mm · 18 AWG RED|Protects ALL downstream"/>
      <text x="315" y="224" font-size="10" fill="var(--accent)" text-anchor="middle" class="bold-text">F_MAIN 2A</text>
      <text x="315" y="248" font-size="9" fill="var(--text-secondary)" text-anchor="middle">slow-blow</text>
    </g>

    <g id="F1">
      <rect class="comp" rx="2" x="440" y="210" width="70" height="20"
            data-info="F1|Inline fuse 1 A slow-blow (T1A)|5×20 mm · 22 AWG RED|ESP sub-branch protection"/>
      <text x="475" y="224" font-size="10" fill="var(--accent)" text-anchor="middle" class="bold-text">F1 · 1A</text>
      <text x="475" y="248" font-size="9" fill="var(--text-secondary)" text-anchor="middle">slow-blow → ESP</text>
    </g>

    <g id="F2">
      <rect class="comp" rx="2" x="390" y="340" width="20" height="70"
            data-info="F2|Inline fuse 1.5 A slow-blow (T1.5A)|5×20 mm · 22 AWG RED|Buck sub-branch protection"/>
      <text x="400" y="378" font-size="9" fill="var(--accent)" text-anchor="middle" class="bold-text" transform="rotate(-90,400,375)">F2 · 1.5A</text>
      <text x="385" y="375" font-size="9" fill="var(--text-secondary)" text-anchor="middle" transform="rotate(-90,385,375)">slow-blow → BUCK</text>
    </g>

    <!-- ===== BUCK CONVERTER (Column B) ===== -->
    <g id="U2">
      <rect class="comp" rx="2" x="470" y="480" width="210" height="110"
            data-info="U2|DC-DC Buck Converter|12 V → 5 V · ≥3 A adjustable|⚠ Pre-set 5.00 V no-load before COM bus"/>
      <text x="570" y="515" font-size="18" fill="var(--accent)" text-anchor="middle" class="black-text">U2</text>
      <text x="570" y="535" font-size="12" fill="var(--text-primary)" text-anchor="middle" class="bold-text">BUCK 12V→5V</text>
      <text x="570" y="552" font-size="10" fill="var(--text-secondary)" text-anchor="middle">≥3 A · adjustable</text>
      <text x="570" y="570" font-size="9" fill="var(--warn)" text-anchor="middle" class="bold-text">Pre-cal: 5.00 V</text>
      <text x="465" y="506" font-size="10" fill="var(--wire-12v)" class="bold-text" text-anchor="end">VIN</text>
      <text x="465" y="566" font-size="10" fill="var(--wire-gnd)" class="bold-text" text-anchor="end">GND</text>
      <text x="700" y="506" font-size="10" fill="var(--wire-5v)" class="bold-text">VOUT</text>
      <text x="700" y="566" font-size="10" fill="var(--wire-gnd)" class="bold-text">GND</text>
      <circle cx="470" cy="510" r="3" class="pin"/>
      <circle cx="470" cy="560" r="3" class="pin"/>
      <circle cx="680" cy="510" r="3" class="pin"/>
      <circle cx="680" cy="560" r="3" class="pin"/>
    </g>

    <!-- ===== ANT1 antenna ===== -->
    <g id="ANT1">
      <rect class="comp" rx="2" x="900" y="105" width="180" height="34"
            data-info="ANT1|External 2.4 GHz SMA antenna|u.FL pigtail or direct SMA|For enclosed mounting"/>
      <text x="990" y="125" font-size="11" fill="var(--accent)" text-anchor="middle" class="black-text">ANT1 · 2.4 GHz SMA</text>
      <text x="990" y="137" font-size="9" fill="var(--text-secondary)" text-anchor="middle">u.FL → SMA pigtail</text>
    </g>
    <!-- ANT1 → U1.ANT pigtail stub: down outside U1 board → left along top border → down to ANT node -->
    <line x1="990" y1="139" x2="990" y2="173" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="990" y1="173" x2="803" y2="173" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="803" y1="173" x2="803" y2="218" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="3 3"/>

    <!-- ===== U1 ESP32-S3-Relay-6CH (Column C) — Waveshare physical form factor SVG ===== -->
    <g id="U1">
      <!-- ── Physical board visual (user-provided SVG scaled to schematic space) ──────────── -->
      <!-- Transform: translate(806.07,174) scale(0.8539,0.8)                                 -->
      <!--   Horizontal: src cx=110 → sch 900 (left pins), src cx=555 → sch 1280 (right pins) -->
      <!--   Vertical:   src CH1-COM cy=95  → sch 250 ; src CH4-COM cy=470 → sch 550          -->
      <!-- RC1–RC4 are drawn after U1 in SVG order, so they naturally cover any right overflow -->
      <g transform="translate(696.07,174) scale(0.8539,0.8)">

        <!-- Board outline — comp-fill background, accent glow border (also U1 tooltip target) -->
        <rect x="70" y="15" width="560" height="810"
              fill="var(--comp-fill)" stroke="var(--accent)" stroke-width="1.76" rx="6" opacity="0.55"
              style="cursor:pointer;"
              data-info="U1|Waveshare ESP32-S3-Relay-6CH|7–36 V VIN · 6× SPDT relays (4 used)|WLED firmware · CH1/2/41/42 → CH1/2/3/4"/>
        <!-- Inner silkscreen border (subtle accent line, matches other component inner borders) -->
        <rect x="78" y="23" width="544" height="794"
              fill="none" stroke="var(--accent)" stroke-width="0.7" rx="4" opacity="0.2"/>

        <!-- ANT mounting hole (top-left) — accent glow to match theme -->
        <circle cx="125" cy="55" r="11" fill="none" stroke="var(--accent)" stroke-width="1.17" opacity="0.55"/>
        <circle cx="125" cy="55" r="4"  fill="none" stroke="var(--accent)" stroke-width="0.7" opacity="0.4"/>
        <circle cx="125" cy="55" r="1.5" fill="var(--accent)" opacity="0.6"/>
        <text x="125" y="88" text-anchor="middle" font-size="11" fill="var(--text-secondary)" opacity="0.7">ANT</text>


        <!-- ── CH1 terminal block ── -->
        <rect x="535" y="35"  width="90" height="125" rx="3"
              fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="0.94"/>
        <text x="540" y="49"  font-size="13" font-weight="bold" fill="var(--wire-data)">CH1 · GPIO1</text>
        <!-- NC (top, unused) -->
        <circle cx="615" cy="60"  r="7" fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="1.4" opacity="0.45"/>
        <text x="605" y="64"  font-size="11" fill="var(--text-secondary)" opacity="0.45" text-anchor="end">NC</text>
        <!-- COM (mid, PSU+ bus) -->
        <circle cx="615" cy="95"  r="7" fill="var(--comp-fill)" stroke="var(--wire-5v)"  stroke-width="1.4"/>
        <text x="605" y="99"  font-size="11" fill="var(--wire-5v)" text-anchor="end">COM</text>
        <!-- NO (bot, switched) -->
        <circle cx="615" cy="130" r="7" fill="var(--comp-fill)" stroke="var(--wire-data)" stroke-width="1.4"/>
        <text x="605" y="134" font-size="11" fill="var(--wire-data)" text-anchor="end">NO</text>

        <!-- ── CH2 terminal block ── -->
        <rect x="535" y="160" width="90" height="125" rx="3"
              fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="0.94"/>
        <text x="540" y="174" font-size="13" font-weight="bold" fill="var(--wire-data2)">CH2 · GPIO2</text>
        <circle cx="615" cy="185" r="7" fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="1.4" opacity="0.45"/>
        <text x="605" y="189" font-size="11" fill="var(--text-secondary)" opacity="0.45" text-anchor="end">NC</text>
        <circle cx="615" cy="220" r="7" fill="var(--comp-fill)" stroke="var(--wire-5v)"   stroke-width="1.4"/>
        <text x="605" y="224" font-size="11" fill="var(--wire-5v)" text-anchor="end">COM</text>
        <circle cx="615" cy="255" r="7" fill="var(--comp-fill)" stroke="var(--wire-data2)" stroke-width="1.4"/>
        <text x="605" y="259" font-size="11" fill="var(--wire-data2)" text-anchor="end">NO</text>

        <!-- ── CH3 terminal block ── -->
        <rect x="535" y="285" width="90" height="125" rx="3"
              fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="0.94"/>
        <text x="540" y="299" font-size="13" font-weight="bold" fill="var(--wire-data3)">CH3 · GPIO41</text>
        <circle cx="615" cy="310" r="7" fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="1.4" opacity="0.45"/>
        <text x="605" y="314" font-size="11" fill="var(--text-secondary)" opacity="0.45" text-anchor="end">NC</text>
        <circle cx="615" cy="345" r="7" fill="var(--comp-fill)" stroke="var(--wire-5v)"   stroke-width="1.4"/>
        <text x="605" y="349" font-size="11" fill="var(--wire-5v)" text-anchor="end">COM</text>
        <circle cx="615" cy="380" r="7" fill="var(--comp-fill)" stroke="var(--wire-data3)" stroke-width="1.4"/>
        <text x="605" y="384" font-size="11" fill="var(--wire-data3)" text-anchor="end">NO</text>

        <!-- ── CH4 terminal block ── -->
        <rect x="535" y="410" width="90" height="125" rx="3"
              fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="0.94"/>
        <text x="540" y="424" font-size="13" font-weight="bold" fill="var(--wire-data4)">CH4 · GPIO42</text>
        <circle cx="615" cy="435" r="7" fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="1.4" opacity="0.45"/>
        <text x="605" y="439" font-size="11" fill="var(--text-secondary)" opacity="0.45" text-anchor="end">NC</text>
        <circle cx="615" cy="470" r="7" fill="var(--comp-fill)" stroke="var(--wire-5v)"   stroke-width="1.4"/>
        <text x="605" y="474" font-size="11" fill="var(--wire-5v)" text-anchor="end">COM</text>
        <circle cx="615" cy="505" r="7" fill="var(--comp-fill)" stroke="var(--wire-data4)" stroke-width="1.4"/>
        <text x="605" y="509" font-size="11" fill="var(--wire-data4)" text-anchor="end">NO</text>

        <!-- ── CH5 (unused) terminal block ── -->
        <rect x="535" y="535" width="90" height="125" rx="3"
              fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="0.94" opacity="0.45"/>
        <text x="540" y="549" font-size="13" font-weight="bold" fill="var(--text-secondary)" opacity="0.5">CH5</text>
        <circle cx="615" cy="560" r="7" fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="1.4" opacity="0.4"/>
        <text x="605" y="564" font-size="11" fill="var(--text-secondary)" opacity="0.4" text-anchor="end">NC</text>
        <circle cx="615" cy="595" r="7" fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="1.4" opacity="0.4"/>
        <text x="605" y="599" font-size="11" fill="var(--text-secondary)" opacity="0.4" text-anchor="end">COM</text>
        <circle cx="615" cy="630" r="7" fill="var(--comp-fill)" stroke="var(--comp-stroke)" stroke-width="1.4" opacity="0.4"/>
        <text x="605" y="634" font-size="11" fill="var(--text-secondary)" opacity="0.4" text-anchor="end">NO</text>

        <!-- ── CH6 (unused) terminal block ── -->

    <text x="1365" y="1135" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">1.</tspan> Fuse topology: F_MAIN (T2A) protects all downstream; F1 (T1A) only the ESP/relay-coil
      <tspan x="1380" dy="14">sub-branch; F2 (T1.5A) only the buck input. Each atomizer is individually fused</tspan>
      <tspan x="1380" dy="14">with T500 mA. If a channel nuisance-trips, swap that fuse for T750 mA.</tspan>
    </text>
    <text x="1365" y="1190" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">2.</tspan> 5 V relay COM: the four CHn.COM screw terminals are INDEPENDENT — not internally
      <tspan x="1380" dy="14">tied. Splice the buck 5 V output through a ferrule into four short pigtails, one</tspan>
      <tspan x="1380" dy="14">per CH1.COM…CH4.COM. Do NOT assume one wire to the board is enough.</tspan>
    </text>
    <text x="1365" y="1245" font-size="12" fill="var(--warn)" class="bold-text">
      <tspan fill="var(--text-primary)">3.</tspan> Buck pre-calibration: with F2 installed and the buck output DISCONNECTED from
      <tspan x="1380" dy="14">the COM bus, power up the PSU and adjust the trim pot until a DMM reads</tspan>
      <tspan x="1380" dy="14">5.00 V ± 0.05 V. Power down. Only then connect the COM bus.</tspan>
    </text>
    <text x="1365" y="1300" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">4.</tspan> RC snubbers (RC1–RC4) sit across each relay's COM ↔ NO terminal pair (4 total)
      <tspan x="1380" dy="14">to suppress contact arcing on switching. Standard 100 nF + 100 Ω modules.</tspan>
    </text>
    <text x="1365" y="1340" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">5.</tspan> GND topology: single star bus. 18 AWG trunk from PSU to a screw-terminal block;
      <tspan x="1380" dy="14">22 AWG spurs from each atomizer driver and the buck converter return to that</tspan>
      <tspan x="1380" dy="14">same block. A1–A4 returns merge on a right-side collector before the trunk.</tspan>
    </text>
    <text x="1365" y="1395" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">6.</tspan> EMI hygiene: piezo drivers run at 113 kHz. Keep atomizer feed runs short
      <tspan x="1380" dy="14">(&lt; 30 cm) and twist each 5V+ / GND pair to minimize loop area and 2.4 GHz coupling.</tspan>
    </text>
    <text x="1365" y="1435" font-size="12" fill="var(--warn)" class="bold-text">
      <tspan fill="var(--text-primary)">7.</tspan> WLED rule: Solid effects only on scent segments — never Strobe, Fire, or any
      <tspan x="1380" dy="14">flashing effect. Mechanical relays will not survive being switched at audio rates.</tspan>
    </text>
    <text x="1365" y="1475" font-size="12" fill="var(--warn)" class="bold-text">
      <tspan fill="var(--text-primary)">8.</tspan> Global Relay setting: in WLED Config → Hardware, set Relay GPIO = −1 (unused)
      <tspan x="1380" dy="14">to prevent all four channels firing on power-up.</tspan>
    </text>

      <tspan x="1430" dy="16" fill="var(--text-secondary)">includes corrected fuse topology (F_MAIN + F2 added)</tspan>
      <tspan x="1430" dy="16" fill="var(--text-secondary)">and 18 AWG upsize on buck-output and ESP sub-branch trunks.</tspan>

<script>
  const tip = document.getElementById('tip');
  const tipTtl = document.getElementById('tipTtl');
  const tipDesc = document.getElementById('tipDesc');
  document.querySelectorAll('[data-info]').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      const t = e.target.closest('[data-info]') || e.target;
      const info = t.getAttribute('data-info');
      if (info) {
        const parts = info.split('|');
        tipTtl.textContent = parts[0];
        tipDesc.textContent = '';
        parts.slice(1).forEach((seg, i) => {
          if (i > 0) tipDesc.appendChild(document.createElement('br'));
          tipDesc.appendChild(document.createTextNode(seg));
        });
        tip.classList.add('on');
      }
    });
    el.addEventListener('mouseleave', () => tip.classList.remove('on'));
  });
  const container = document.getElementById('schematic-container');
  const wrapper = document.getElementById('svg-wrapper');
  const zoomLevelEl = document.getElementById('zoom-level');
  let scale = 1, panX = 0, panY = 0, isPanning = false, startX, startY;
  const MIN_SCALE = 0.1, MAX_SCALE = 4, ZOOM_STEP = 0.15;
  const SVG_W = 2400, SVG_H = 1800;
  function updateTransform() {
    wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    zoomLevelEl.textContent = Math.round(scale * 100) + '%';
  }
  function zoomTo(ns, cx, cy) {
    ns = Math.max(MIN_SCALE, Math.min(MAX_SCALE, ns));
    if (cx !== undefined && cy !== undefined) {
      const r = ns / scale;
      panX = cx - (cx - panX) * r;
      panY = cy - (cy - panY) * r;
    }
    scale = ns;
    updateTransform();
  }
  function zoomIn()  { const r = container.getBoundingClientRect(); zoomTo(scale * (1 + ZOOM_STEP), r.width / 2, r.height / 2); }
  function zoomOut() { const r = container.getBoundingClientRect(); zoomTo(scale * (1 - ZOOM_STEP), r.width / 2, r.height / 2); }
  function fitToScreen() {
    const r = container.getBoundingClientRect();
    scale = Math.min(r.width / SVG_W, r.height / SVG_H) * 0.95;
    panX = (r.width - SVG_W * scale) / 2;
    panY = (r.height - SVG_H * scale) / 2;
    updateTransform();
  }
  document.getElementById('zoom-in').addEventListener('click', zoomIn);
  document.getElementById('zoom-out').addEventListener('click', zoomOut);
  document.getElementById('zoom-fit').addEventListener('click', fitToScreen);
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const r = container.getBoundingClientRect();
    zoomTo(scale * (e.deltaY > 0 ? (1 - ZOOM_STEP) : (1 + ZOOM_STEP)), e.clientX - r.left, e.clientY - r.top);
  }, { passive: false });
  container.addEventListener('mousedown', (e) => {
    if (e.target.closest('.comp') || e.target.closest('#zoom-controls')) return;
    isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY;
    container.classList.add('grabbing');
  });
  window.addEventListener('mousemove', (e) => { if (!isPanning) return; panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); });
  window.addEventListener('mouseup', () => { isPanning = false; container.classList.remove('grabbing'); });
  let lastTouchDist = 0;
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) { isPanning = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; }
    else if (e.touches.length === 2) { e.preventDefault(); isPanning = false; const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY; lastTouchDist = Math.sqrt(dx*dx+dy*dy); }
  }, { passive: false });
  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isPanning) { panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY; updateTransform(); }
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy), r = container.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left, cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
      zoomTo(scale * (dist / lastTouchDist), cx, cy); lastTouchDist = dist;
    }
  }, { passive: false });
  container.addEventListener('touchend', () => { isPanning = false; });
  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey) {
      if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
      else if (e.key === '-' || e.key === '_') { e.preventDefault(); zoomOut(); }

    }
  });
  window.addEventListener('load', () => { (document.fonts?.ready || Promise.resolve()).then(fitToScreen); });
  function getSvgStringThemed() {
    const clone = document.getElementById('schematic-svg').cloneNode(true);
    const styleTag = document.querySelector('style');
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const style = document.createElementNS("http://www.w3.org/2000/svg", "style");
    style.textContent = styleTag ? styleTag.innerHTML : '';
    defs.appendChild(style);
    const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

    bgRect.setAttribute("width", "100%"); bgRect.setAttribute("height", "100%"); bgRect.setAttribute("fill", bgColor || "#0A0A0F");
    clone.insertBefore(bgRect, clone.firstChild);
    clone.insertBefore(defs, clone.firstChild);
    if (!clone.getAttribute("xmlns")) clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

  }
  function getSvgStringPrint() {
    const clone = document.getElementById('schematic-svg').cloneNode(true);
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

    style.textContent = `
      svg { background: transparent !important; }
      .comp, .sec-border-dash,
      .w12v, .w12v-bus, .wgnd, .wgnd-bus, .w5v, .w5v-bus, .w3v3, .w3v3-bus,

      .comp, .sec-border-dash,
      .w12v, .w12v-bus, .wgnd, .wgnd-bus, .w5v, .w5v-bus, .w3v3, .w3v3-bus,
      .wdata, .wdata2, .wdata3, .wdata4, .wdata5, .wdata6, .wdata7 {
        fill: none !important;
      }
      .j12v, .jgnd, .j5v, .j3v3,
      .jdata, .jdata2, .jdata3, .jdata4, .jdata5, .jdata6, .jdata7,
      .pin {
        fill: #000 !important;
        stroke: none !important;
      }
      text { fill: #000 !important; }
      line[stroke], path[stroke], polyline[stroke], rect[stroke], circle[stroke] {
        stroke: #000 !important;
      }
      [fill]:not(text):not(.j12v):not(.jgnd):not(.j5v):not(.j3v3):not(.jdata):not(.jdata2):not(.jdata3):not(.jdata4):not(.jdata5):not(.jdata6):not(.jdata7):not(.pin) {
        fill: none !important;

  function exportFilename(ext) {
    const title = document.title.replace(/[\\/:*?"<>|]/g, '_') || 'Schematic_Export';
    return title + '.' + ext;
  }
  document.getElementById('export-svg').addEventListener('click', () => {
    const blob = new Blob([getSvgStringPrint()], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(blob);

  });
  document.getElementById('export-png').addEventListener('click', () => {
    const btn = document.getElementById('export-png');
    const origText = btn.textContent; btn.textContent = "WAIT..."; btn.style.opacity = "0.5";
    const canvas = document.createElement("canvas"); canvas.width = SVG_W; canvas.height = SVG_H;

      btn.textContent = origText; btn.style.opacity = "1";
      URL.revokeObjectURL(url);
      console.error("PNG export: SVG image failed to load");
    };
    img.src = url;
  });
</script>
</body>
</html>
